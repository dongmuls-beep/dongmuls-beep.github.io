name: Daily ETF Data Update

on:
  schedule:
    # Runs at 00:00 UTC (09:00 KST) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual run from GitHub interface

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas selenium webdriver-manager requests openpyxl xlrd

      - name: Run ETL Script
        run: python etl_process.py

      - name: Build Changelog
        run: python scripts/build_changelog.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update ETF data (Daily)"
          file_pattern: "data.json changelog.json update-meta.json"
